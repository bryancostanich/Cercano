name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: cercano-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: cercano-darwin-amd64
          - goos: linux
            goarch: amd64
            name: cercano-linux-amd64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: source/server/go.mod
          cache-dependency-path: source/server/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o ${{ matrix.name }} ./cmd/cercano

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: source/server/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
