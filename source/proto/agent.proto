syntax = "proto3";

package agent;

option go_package = "cercano/source/server/pkg/proto";

// The Agent service definition.
service Agent {
  // ProcessRequest handles AI requests (Unary).
  rpc ProcessRequest (ProcessRequestRequest) returns (ProcessRequestResponse) {}

  // StreamProcessRequest handles AI requests with progress updates (Streaming).
  rpc StreamProcessRequest (ProcessRequestRequest) returns (stream StreamProcessResponse) {}
}

// The response message for StreamProcessRequest.
message StreamProcessResponse {
  oneof payload {
    ProgressUpdate progress = 1;
    ProcessRequestResponse final_response = 2;
  }
}

// Progress update during a long-running task.
message ProgressUpdate {
  string message = 1;
}

// The request message for ProcessRequest.
message ProcessRequestRequest {
  string input = 1; // User input or query
  CloudProviderConfig provider_config = 2; // Optional provider configuration
  string work_dir = 3;  // Optional working directory for agentic tasks
  string file_name = 4; // Optional filename for agentic tasks
}

// Configuration for cloud providers.
message CloudProviderConfig {
  string provider = 1; // e.g., "google", "anthropic"
  string model = 2;    // e.g., "gemini-1.5-pro", "claude-3-opus"
  string api_key = 3;  // API key for the provider
}

// The response message for ProcessRequest.
message ProcessRequestResponse {
  string output = 1; // AI generated output
  repeated FileChange file_changes = 2; // Optional structured file modifications
  RoutingMetadata routing_metadata = 3; // Optional metadata about the model/routing
  string validation_errors = 4; // Optional captured validation errors (e.g. test failures)
}

// Represents a change to a specific file.
message FileChange {
  string path = 1;      // File path (relative to work_dir)
  string content = 2;   // New file content
  FileAction action = 3; // Type of action to perform
}

// Possible actions for a FileChange.
enum FileAction {
  CREATE = 0;
  UPDATE = 1;
  DELETE = 2;
}

// Metadata about the routing and model execution.
message RoutingMetadata {
  string model_name = 1; // Name of the model that processed the request
  float confidence = 2;  // Confidence score for the routing decision
  bool escalated = 3;   // Whether the request was escalated to cloud
}
