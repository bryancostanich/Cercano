syntax = "proto3";

package agent;

option go_package = "cercano/source/server/pkg/proto";

// The Agent service definition.
service Agent {
  // ProcessRequest handles AI requests.
  rpc ProcessRequest (ProcessRequestRequest) returns (ProcessRequestResponse) {}
}

// The request message for ProcessRequest.
message ProcessRequestRequest {
  string input = 1; // User input or query
  CloudProviderConfig provider_config = 2; // Optional provider configuration
}

// Configuration for cloud providers.
message CloudProviderConfig {
  string provider = 1; // e.g., "google", "anthropic"
  string model = 2;    // e.g., "gemini-1.5-pro", "claude-3-opus"
  string api_key = 3;  // API key for the provider
}

// The response message for ProcessRequest.
message ProcessRequestResponse {
  string output = 1; // AI generated output
}
