syntax = "proto3";

package agent;

option go_package = "cercano/source/server/pkg/proto";

// The Agent service definition.
service Agent {
  // ProcessRequest handles AI requests (Unary).
  rpc ProcessRequest (ProcessRequestRequest) returns (ProcessRequestResponse) {}

  // StreamProcessRequest handles AI requests with progress updates (Streaming).
  rpc StreamProcessRequest (ProcessRequestRequest) returns (stream StreamProcessResponse) {}

  // UpdateConfig updates runtime configuration (model, provider) without server restart.
  rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse) {}

  // ListModels returns the models available on the active Ollama instance.
  rpc ListModels (ListModelsRequest) returns (ListModelsResponse) {}
}

// Incremental token from LLM streaming.
message TokenDelta {
  string content = 1;
}

// The response message for StreamProcessRequest.
message StreamProcessResponse {
  oneof payload {
    ProgressUpdate progress = 1;
    ProcessRequestResponse final_response = 2;
    TokenDelta token_delta = 3;
  }
}

// Progress update during a long-running task.
message ProgressUpdate {
  string message = 1;
}

// The request message for ProcessRequest.
message ProcessRequestRequest {
  string input = 1; // User input or query
  // Field 2 removed (was CloudProviderConfig provider_config)
  string work_dir = 3;  // Optional working directory for agentic tasks
  string file_name = 4; // Optional filename for agentic tasks
  string conversation_id = 5; // Optional conversation ID for multi-turn history
}

// Runtime configuration update request.
message UpdateConfigRequest {
  string local_model = 1;    // Ollama model name (e.g., "qwen3-coder", "GLM-4.7-Flash")
  string cloud_provider = 2; // Cloud provider name (e.g., "google", "anthropic")
  string cloud_model = 3;    // Cloud model name (e.g., "gemini-1.5-flash", "claude-3-opus")
  string cloud_api_key = 4;  // API key for the cloud provider
  string ollama_url = 5;     // Ollama endpoint URL (e.g., "http://mac-studio.local:11434")
}

// Runtime configuration update response.
message UpdateConfigResponse {
  bool success = 1;
  string message = 2;
}

// The response message for ProcessRequest.
message ProcessRequestResponse {
  string output = 1; // AI generated output
  repeated FileChange file_changes = 2; // Optional structured file modifications
  RoutingMetadata routing_metadata = 3; // Optional metadata about the model/routing
  string validation_errors = 4; // Optional captured validation errors (e.g. test failures)
}

// Represents a change to a specific file.
message FileChange {
  string path = 1;      // File path (relative to work_dir)
  string content = 2;   // New file content
  FileAction action = 3; // Type of action to perform
}

// Possible actions for a FileChange.
enum FileAction {
  CREATE = 0;
  UPDATE = 1;
  DELETE = 2;
}

// Metadata about the routing and model execution.
message RoutingMetadata {
  string model_name = 1; // Name of the model that processed the request
  float confidence = 2;  // Confidence score for the routing decision
  bool escalated = 3;   // Whether the request was escalated to cloud
  string endpoint = 4;  // Active Ollama endpoint URL that served the request
  bool is_fallback = 5; // Whether the fallback (local) endpoint was used
}

// Request to list available models on the active Ollama instance.
message ListModelsRequest {}

// A single model available on an Ollama instance.
message ModelInfo {
  string name = 1;        // Model name (e.g., "qwen3-coder:latest")
  int64 size = 2;         // Model size in bytes
  string modified_at = 3; // Last modified timestamp
}

// Response containing available models.
message ListModelsResponse {
  repeated ModelInfo models = 1;
}
